name: Build and Dockerize Backend

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test-docker:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: backend
        run: npm install

      - name: Run tests
        working-directory: backend
        run: npm test

      - name: Login to Docker Hub
        # بنسجّل دخول لـ Docker Hub بالأسرار المحفوظة في GitHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/student-help-desk:latest ./backend

      - name: Push Docker image to Docker Hub
        # برفع الصورة على Docker Hub عشان نقدر نسحبها من أي جهاز
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/student-help-desk:latest
