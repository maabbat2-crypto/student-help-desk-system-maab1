<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>نظام الدعم الجامعي - JUST</title>
  <style>
    /* ستايل بسيط، ما بدنا نعقّد الأمور */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #f0f2f5;
      color: #333;
    }

    header {
      background: #003366;
      color: white;
      padding: 15px 30px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 { font-size: 1.2rem; }

    #logout-btn {
      background: #cc0000;
      color: white;
      border: none;
      padding: 8px 16px;
      border-radius: 5px;
      cursor: pointer;
      display: none;
    }

    .container {
      max-width: 900px;
      margin: 30px auto;
      padding: 0 20px;
    }

    .card {
      background: white;
      border-radius: 8px;
      padding: 25px;
      margin-bottom: 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    .card h2 {
      margin-bottom: 15px;
      color: #003366;
      border-bottom: 2px solid #003366;
      padding-bottom: 8px;
    }

    input, textarea, select {
      width: 100%;
      padding: 10px;
      margin: 8px 0 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 14px;
      font-family: Arial, sans-serif;
    }

    textarea { height: 100px; resize: vertical; }

    button.primary {
      background: #003366;
      color: white;
      border: none;
      padding: 10px 25px;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
    }

    button.primary:hover { background: #004499; }

    .ticket-card {
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 15px;
      margin-bottom: 12px;
    }

    .ticket-card h3 { margin-bottom: 8px; }

    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: bold;
      margin-right: 5px;
    }

    .badge.open { background: #d4edda; color: #155724; }
    .badge.in-progress { background: #fff3cd; color: #856404; }
    .badge.closed { background: #f8d7da; color: #721c24; }

    .msg {
      padding: 10px;
      border-radius: 5px;
      margin: 10px 0;
      font-size: 14px;
    }
    .msg.success { background: #d4edda; color: #155724; }
    .msg.error { background: #f8d7da; color: #721c24; }

    #login-section, #app-section { display: none; }

    .tabs { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab-btn {
      padding: 8px 20px;
      border: 2px solid #003366;
      background: white;
      color: #003366;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
    }
    .tab-btn.active { background: #003366; color: white; }
  </style>
</head>
<body>

<header>
  <h1>🎓 نظام الدعم الجامعي - JUST Help Desk</h1>
  <button id="logout-btn" onclick="logout()">تسجيل الخروج</button>
</header>

<div class="container">

  <!-- قسم تسجيل الدخول -->
  <div id="login-section" class="card">
    <h2>تسجيل الدخول</h2>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('login')">دخول</button>
      <button class="tab-btn" onclick="switchTab('register')">تسجيل جديد</button>
    </div>

    <!-- فورم الدخول -->
    <div id="login-form">
      <label>الإيميل:</label>
      <input type="email" id="login-email" placeholder="admin@just.edu.jo" />
      <label>كلمة المرور:</label>
      <input type="password" id="login-password" placeholder="********" />
      <button class="primary" onclick="login()">دخول</button>
      <div id="login-msg"></div>
    </div>

    <!-- فورم التسجيل -->
    <div id="register-form" style="display:none">
      <label>الاسم الكامل:</label>
      <input type="text" id="reg-name" placeholder="محمد أحمد" />
      <label>الإيميل الجامعي:</label>
      <input type="email" id="reg-email" placeholder="student@just.edu.jo" />
      <label>كلمة المرور:</label>
      <input type="password" id="reg-password" placeholder="********" />
      <button class="primary" onclick="register()">تسجيل</button>
      <div id="register-msg"></div>
    </div>
  </div>

  <!-- قسم التطبيق بعد الدخول -->
  <div id="app-section">

    <!-- قسم الطالب -->
    <div id="student-section">
      <div class="card">
        <h2>رفع تذكرة جديدة</h2>
        <label>عنوان المشكلة:</label>
        <input type="text" id="ticket-title" placeholder="مثال: مشكلة في تسجيل الدخول" />
        <label>وصف المشكلة:</label>
        <textarea id="ticket-desc" placeholder="اشرح المشكلة بالتفصيل..."></textarea>
        <button class="primary" onclick="submitTicket()">إرسال التذكرة</button>
        <div id="ticket-msg"></div>
      </div>

      <div class="card">
        <h2>تذاكري</h2>
        <button class="primary" onclick="loadTickets()" style="margin-bottom:15px">تحديث</button>
        <div id="my-tickets"></div>
      </div>
    </div>

    <!-- قسم الأدمن -->
    <div id="admin-section" style="display:none">
      <div class="card">
        <h2>كل التذاكر</h2>
        <button class="primary" onclick="loadTickets()" style="margin-bottom:15px">تحديث</button>
        <div id="all-tickets"></div>
      </div>
    </div>

  </div>
</div>

<script>
  // المتغيرات العامة
  let currentToken = null
  let currentUser = null
  const API = '/api'

  // أول ما تفتح الصفحة بتحقق إذا في توكن محفوظ
  window.onload = () => {
    const savedToken = localStorage.getItem('token')
    const savedUser = localStorage.getItem('user')

    if (savedToken && savedUser) {
      currentToken = savedToken
      currentUser = JSON.parse(savedUser)
      showApp()
    } else {
      document.getElementById('login-section').style.display = 'block'
    }
  }

  // تبديل بين تسجيل الدخول والتسجيل الجديد
  function switchTab(tab) {
    const tabs = document.querySelectorAll('.tab-btn')
    tabs.forEach(t => t.classList.remove('active'))

    if (tab === 'login') {
      tabs[0].classList.add('active')
      document.getElementById('login-form').style.display = 'block'
      document.getElementById('register-form').style.display = 'none'
    } else {
      tabs[1].classList.add('active')
      document.getElementById('login-form').style.display = 'none'
      document.getElementById('register-form').style.display = 'block'
    }
  }

  // تسجيل الدخول
  async function login() {
    const email = document.getElementById('login-email').value
    const password = document.getElementById('login-password').value

    try {
      const res = await fetch(`${API}/auth/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      })

      const data = await res.json()

      if (res.ok) {
        currentToken = data.token
        currentUser = data.user
        localStorage.setItem('token', currentToken)
        localStorage.setItem('user', JSON.stringify(currentUser))
        showApp()
      } else {
        showMsg('login-msg', data.message, 'error')
      }
    } catch (err) {
      showMsg('login-msg', 'في مشكلة بالاتصال بالسيرفر', 'error')
    }
  }

  // تسجيل مستخدم جديد
  async function register() {
    const name = document.getElementById('reg-name').value
    const email = document.getElementById('reg-email').value
    const password = document.getElementById('reg-password').value

    try {
      const res = await fetch(`${API}/auth/register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, password })
      })

      const data = await res.json()

      if (res.ok) {
        showMsg('register-msg', 'تم التسجيل! سجّل دخولك هلق', 'success')
        setTimeout(() => switchTab('login'), 1500)
      } else {
        showMsg('register-msg', data.message, 'error')
      }
    } catch (err) {
      showMsg('register-msg', 'في مشكلة بالاتصال', 'error')
    }
  }

  // تسجيل الخروج
  function logout() {
    currentToken = null
    currentUser = null
    localStorage.removeItem('token')
    localStorage.removeItem('user')
    document.getElementById('app-section').style.display = 'none'
    document.getElementById('login-section').style.display = 'block'
    document.getElementById('logout-btn').style.display = 'none'
  }

  // إظهار التطبيق حسب نوع المستخدم
  function showApp() {
    document.getElementById('login-section').style.display = 'none'
    document.getElementById('app-section').style.display = 'block'
    document.getElementById('logout-btn').style.display = 'block'

    if (currentUser.role === 'admin') {
      document.getElementById('admin-section').style.display = 'block'
      document.getElementById('student-section').style.display = 'none'
    } else {
      document.getElementById('student-section').style.display = 'block'
      document.getElementById('admin-section').style.display = 'none'
    }

    loadTickets()
  }

  // رفع تذكرة جديدة
  async function submitTicket() {
    const title = document.getElementById('ticket-title').value
    const description = document.getElementById('ticket-desc').value

    try {
      const res = await fetch(`${API}/tickets`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${currentToken}`
        },
        body: JSON.stringify({ title, description })
      })

      const data = await res.json()

      if (res.ok) {
        showMsg('ticket-msg', `تم رفع التذكرة! تصنيفها: ${data.ticket.category}`, 'success')
        document.getElementById('ticket-title').value = ''
        document.getElementById('ticket-desc').value = ''
        loadTickets()
      } else {
        showMsg('ticket-msg', data.message, 'error')
      }
    } catch (err) {
      showMsg('ticket-msg', 'في مشكلة بالاتصال', 'error')
    }
  }

  // جلب التذاكر وعرضها
  async function loadTickets() {
    try {
      const res = await fetch(`${API}/tickets`, {
        headers: { 'Authorization': `Bearer ${currentToken}` }
      })

      const tickets = await res.json()

      if (currentUser.role === 'admin') {
        renderAdminTickets(tickets)
      } else {
        renderStudentTickets(tickets)
      }
    } catch (err) {
      console.log('ما قدرنا نجيب التذاكر:', err)
    }
  }

  // عرض تذاكر الطالب
  function renderStudentTickets(tickets) {
    const container = document.getElementById('my-tickets')

    if (tickets.length === 0) {
      container.innerHTML = '<p style="color:#666">ما عندك تذاكر لهلق</p>'
      return
    }

    container.innerHTML = tickets.map(t => `
      <div class="ticket-card">
        <h3>${t.title}</h3>
        <p style="color:#666;margin:5px 0">${t.description}</p>
        <div style="margin:8px 0">
          <span class="badge ${t.status}">${translateStatus(t.status)}</span>
          <span class="badge" style="background:#e3f2fd;color:#1565c0">${t.category}</span>
        </div>
        ${t.adminReply ? `<div style="background:#f0f8ff;padding:10px;border-radius:5px;margin-top:8px"><strong>رد الدعم:</strong> ${t.adminReply}</div>` : '<p style="color:#999;font-size:13px">في انتظار الرد...</p>'}
        <p style="color:#999;font-size:12px;margin-top:8px">${new Date(t.createdAt).toLocaleDateString('ar-JO')}</p>
      </div>
    `).join('')
  }

  // عرض التذاكر للأدمن مع خيار الرد
  function renderAdminTickets(tickets) {
    const container = document.getElementById('all-tickets')

    if (tickets.length === 0) {
      container.innerHTML = '<p style="color:#666">ما في تذاكر لهلق</p>'
      return
    }

    container.innerHTML = tickets.map(t => `
      <div class="ticket-card">
        <h3>${t.title}</h3>
        <p style="color:#666;margin:5px 0">${t.description}</p>
        <p style="font-size:13px">الطالب: <strong>${t.studentName}</strong> (${t.studentEmail})</p>
        <div style="margin:8px 0">
          <span class="badge ${t.status}">${translateStatus(t.status)}</span>
          <span class="badge" style="background:#e3f2fd;color:#1565c0">${t.category}</span>
        </div>
        ${t.adminReply ? `<div style="background:#f0f8ff;padding:10px;border-radius:5px;margin:8px 0"><strong>ردك:</strong> ${t.adminReply}</div>` : ''}
        <div style="margin-top:10px">
          <textarea id="reply-${t.id}" placeholder="اكتب ردك هون..." style="height:70px">${t.adminReply || ''}</textarea>
          <select id="status-${t.id}">
            <option value="open" ${t.status === 'open' ? 'selected' : ''}>مفتوحة</option>
            <option value="in-progress" ${t.status === 'in-progress' ? 'selected' : ''}>قيد المعالجة</option>
            <option value="closed" ${t.status === 'closed' ? 'selected' : ''}>مغلقة</option>
          </select>
          <button class="primary" onclick="replyToTicket('${t.id}')" style="margin-top:8px">إرسال الرد</button>
        </div>
      </div>
    `).join('')
  }

  // الأدمن يرد على تذكرة
  async function replyToTicket(ticketId) {
    const reply = document.getElementById(`reply-${ticketId}`).value
    const status = document.getElementById(`status-${ticketId}`).value

    try {
      const res = await fetch(`${API}/tickets/${ticketId}/reply`, {
        method: 'PUT',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${currentToken}`
        },
        body: JSON.stringify({ reply, status })
      })

      if (res.ok) {
        alert('تم إرسال الرد بنجاح!')
        loadTickets()
      }
    } catch (err) {
      alert('في مشكلة بالإرسال')
    }
  }

  // ترجمة حالة التذكرة للعربي
  function translateStatus(status) {
    const map = { 'open': 'مفتوحة', 'in-progress': 'قيد المعالجة', 'closed': 'مغلقة' }
    return map[status] || status
  }

  // إظهار رسائل النجاح والخطأ
  function showMsg(elementId, message, type) {
    const el = document.getElementById(elementId)
    el.innerHTML = `<div class="msg ${type}">${message}</div>`
    setTimeout(() => { el.innerHTML = '' }, 4000)
  }
</script>

</body>
</html>
